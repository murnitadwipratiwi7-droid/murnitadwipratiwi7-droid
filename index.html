<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kafe Satya - Pemesanan</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>Kafe Satya</h1>
        <nav>
            <a href="#">Beranda</a>
            <a href="#">Menu</a>
            <a href="#">Pesan Sekarang</a>
        </nav>
    </header>

    <div class="container">
        <div class="form-box">
            <h2>Form Pemesanan Menu</h2>
            
            <div class="input-group">
                <label>Nama Pembeli</label>
                <input type="text" id="namaPembeli" value="Murnita Dwi Pratiwi" readonly>
            </div>

            <div class="input-group">
                <label>Pilih Menu</label>
                <select id="pilihMenu">
                    <option value="15000">Kopi Susu - Rp 15.000</option>
                    <option value="20000">Caffe Latte - Rp 20.000</option>
                    <option value="12000">Teh Tarik - Rp 12.000</option>
                    <option value="25000">Nasi Goreng Satya - Rp 25.000</option>
                </select>
            </div>

            <div class="input-group">
                <label>Jumlah Pesanan</label>
                <input type="number" id="jumlahPesanan" value="1" min="1">
            </div>

            <div class="input-group">
                <label>Hari Kedatangan</label>
                <select id="hari">
                    <option value="Senin">Senin</option>
                    <option value="Selasa">Selasa</option>
                    <option value="Rabu">Rabu</option>
                    <option value="Kamis">Kamis</option>
                    <option value="Jumat">Jumat</option>
                    <option value="Sabtu">Sabtu</option>
                    <option value="Minggu">Minggu</option>
                </select>
            </div>

            <button onclick="hitungTotal()">Hitung Total</button>

            <div id="hasil" class="result-text"></div>
        </div>
    </div>

    <footer>
        <p>&copy; 2026 Kafe Satya - Murnita Dwi Pratiwi</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
